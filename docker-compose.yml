networks:
  ecobot_net:
    driver: bridge

services:

  # ─────────────────────────── ИНФРАСТРУКТУРА ───────────────────────────

  redis:
    image: redis:alpine
    restart: always
    networks: [ecobot_net]

  db:
    build: ./db_custom
    restart: always
    env_file: ./db_custom/.env
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./db_custom/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [ecobot_net]

  # ─────────────────────────── BACKEND API ──────────────────────────────

  backend:
    build: ./salut_bot
    restart: always
    depends_on:
      - db
      - redis
    env_file: ./salut_bot/.env
    volumes:
      - ./maps:/app/maps
      - ./salut_bot/images:/app/images
      - ./salut_bot/embedding_models:/app/embedding_models:ro
      - ./salut_bot/knowledge_base_scripts/Vector/faiss_index:/app/knowledge_base_scripts/Vector/faiss_index:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - REDIS_HOST=redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [ecobot_net]

  # ─────────────────────────── LLM СЕРВИСЫ ──────────────────────────────

  gigachat:
    build: ./EcoBotProject/GigaChatAPI
    restart: always
    env_file: ./EcoBotProject/GigaChatAPI/.env
    networks: [ecobot_net]

  rasa-actions:
    build:
      context: ./EcoBotProject/RasaProject
      dockerfile: Dockerfile.actions
    restart: always
    env_file: ./EcoBotProject/RasaProject/.env
    depends_on:
      - backend
      - gigachat
    networks: [ecobot_net]

  rasa:
    build:
      context: ./EcoBotProject/RasaProject
      dockerfile: Dockerfile
    restart: always
    env_file: ./EcoBotProject/RasaProject/.env
    volumes:
      - ./EcoBotProject/RasaProject/models:/app/models
    depends_on:
      - rasa-actions
    networks: [ecobot_net]

  # ─────────────────────────── TELEGRAM BOT ─────────────────────────────

  core-api:
    build: ./EcoBotProject/TelegramBot
    restart: always
    env_file: ./EcoBotProject/TelegramBot/.env
    command: python core_api.py
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - backend
    networks: [ecobot_net]

  telegram:
    build: ./EcoBotProject/TelegramBot
    restart: always
    env_file: ./EcoBotProject/TelegramBot/.env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command: python bot.py
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - backend
      - rasa
      - gigachat
      - core-api
    networks: [ecobot_net]

  # ─────────────────────────── ADMIN PANEL ──────────────────────────────

  admin:
    build: ./AdminPanel
    restart: always
    env_file: ./AdminPanel/.env
    volumes:
      - ./data/admin_db:/app/admin_db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
      - backend
    networks: [ecobot_net]

  # ─────────────────────────── GATEWAY ──────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf
      - ./maps:/var/www/maps
      - ./salut_bot/images:/var/www/images
    depends_on:
      - backend
      - admin
    networks: [ecobot_net]

  # ─────────────────────────── ТОЛЬКО ДЛЯ РАЗРАБОТКИ ────────────────────

  testing:
    build: ./ModulDynamicTestingDSAPIBackend
    restart: "no"
    env_file: ./ModulDynamicTestingDSAPIBackend/.env
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: [dev]
    networks: [ecobot_net]
