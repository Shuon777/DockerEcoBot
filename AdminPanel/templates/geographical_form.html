{% extends "base.html" %}

{% block title %}Новая достопримечательность{% endblock %}

{% block content %}
<div class="card shadow-sm" style="border-radius: 16px; max-width: 800px;">
    <div class="card-body p-5">
        <h4 class="fw-bold mb-4 text-primary">Создание достопримечательности</h4>
        
        <form action="/admin/geographical/save" method="post">
            <div class="row mb-4">
                <div class="col-md-12">
                    <label class="form-label fw-bold text-secondary small">НАЗВАНИЕ *</label>
                    <input type="text" class="form-control form-control-lg" name="name_ru" placeholder="Напр: Озеро Байкал" required>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">ТИП ОБЪЕКТА *</label>
                    <select class="form-select form-select-lg" name="type" required>
                        <option value="Природный">🏞️ Природный (озера, горы, заповедники)</option>
                        <option value="Культурный">🏛️ Культурный (музеи, театры, памятники)</option>
                        <option value="Исторический">🏰 Исторический (крепости, археологические памятники)</option>
                        <option value="Другой">🔷 Другой тип</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">ДОПОЛНИТЕЛЬНАЯ КЛАССИФИКАЦИЯ</label>
                    <input type="text" class="form-control form-control-lg" name="subtype" placeholder="Напр: Озеро, Музей, Заповедник">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary small">ОПИСАНИЕ</label>
                <textarea class="form-control" name="description" rows="4" placeholder="Основное описание достопримечательности..."></textarea>
                <div class="form-text text-muted mt-2">
                    <i class="bi bi-info-circle"></i> Подробные статьи, фотографии и карты вы сможете привязать к объекту на следующем шаге.
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
                <a href="/admin/geographical" class="btn btn-light text-secondary fw-bold px-4 py-2">Отмена</a>
                <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" style="background: var(--accent);">
                    💾 Сохранить и продолжить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
