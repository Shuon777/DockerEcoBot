events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr notice;

    # HTTP → HTTPS redirect + ACME challenge
    server {
        listen 80;
        server_name ecoassistant.194-156-118-21.sslip.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /max-webhook {
            proxy_pass http://max:8080/max-webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name ecoassistant.194-156-118-21.sslip.io;

        ssl_certificate     /etc/letsencrypt/live/ecoassistant.194-156-118-21.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ecoassistant.194-156-118-21.sslip.io/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /maps/ {
            alias /var/www/maps/;
            open_file_cache off;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            autoindex off;
        }

        location /images/ {
            alias /var/www/images/;
            autoindex off;
        }

        location /search/ {
            proxy_pass http://backend:5555/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /core-api/ {
            proxy_pass http://core-api:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /admin/static/ {
            proxy_pass http://admin:8000;
            proxy_set_header Host $host;
        }

        location /admin/ {
            rewrite ^/admin/(.*)$ /$1 break;
            proxy_pass http://admin:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect / /admin/;
            client_max_body_size 10M;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        location /max-webhook {
            proxy_pass http://max:8080/max-webhook;
 proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://backend:5555;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
