events {}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name _;

        location /maps/ {
            alias /var/www/maps/;
            open_file_cache off;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            autoindex on;
        }

        location /images/ {
            alias /var/www/images/;
            autoindex on;
        }

        location /search {
            proxy_pass http://backend:5555;
            proxy_set_header Host $host;
        }

        # Temporarily disabled backend locations due to backend container issues
        # location /api/ {
        #     proxy_pass http://backend:5555;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_read_timeout 120s;
        # }

        # location /search_images_by_features {
        #     proxy_pass http://backend:5555;
        #     proxy_set_header Host $host;
        # }

        # location /object/ {
        #     proxy_pass http://backend:5555;
        #     proxy_set_header Host $host;
        # }

        # location /objects_in_area_by_type {
        #     proxy_pass http://backend:5555;
        #     proxy_set_header Host $host;
        # }

        # location /log_error {
        #     proxy_pass http://backend:5555;
        #     proxy_set_header Host $host;
        # }

        # Static files served by admin container at /admin/static/
        location /admin/static/ {
            proxy_pass http://admin:8000;
            proxy_set_header Host $host;
        }

        # Admin panel: strip /admin prefix, rewrite redirects back to /admin/
        location /admin/ {
            rewrite ^/admin/(.*)$ /$1 break;
            proxy_pass http://admin:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect / /admin/;
            client_max_body_size 10M;
        }
    }
}
